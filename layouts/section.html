{{ define "main" }}
<div class="contenitore pagina">
  {{ partial "briciole.html" . }}
  <h1 data-split="words">{{ .Title }}</h1>
  <div class="prosa intro" data-anim="fade-up">{{ .Content }}</div>
  <div class="griglia griglia-3" data-anim-group>
    {{ range .Pages.ByWeight }}
    <article class="scheda" data-tilt>
      <a href="{{ .RelPermalink }}">
        {{ with .Params.immagine }}<span class="foto-zoom">{{ partial "immagine.html" (dict "percorso" . "alt" "" "larghezza" 640 "skeleton" true) }}</span>{{ end }}
        <h2 class="scheda-titolo">{{ .Title }}</h2>
      </a>
      <p>{{ .Description }}</p>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
