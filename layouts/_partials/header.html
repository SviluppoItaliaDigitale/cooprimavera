<header class="testata">
  <div class="contenitore testata-riga">
    <a class="brand" href="{{ site.Home.RelPermalink }}">
      {{ with resources.Get "img/logo.png" }}
        {{ with .Resize "440x png" }}
        <img src="{{ .RelPermalink }}" width="{{ .Width }}" height="{{ .Height }}" alt="Cooprimavera Società Cooperativa — home">
        {{ end }}
      {{ end }}
    </a>
    <button class="menu-bottone" aria-expanded="false" aria-controls="menu-principale">
      <span class="visivamente-nascosto">Menu</span>
      <span class="menu-icona" aria-hidden="true"></span>
    </button>
    <nav id="menu-principale" class="menu" aria-label="Navigazione principale">
      <ul>
        {{ range site.Menus.main }}
        <li><a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
