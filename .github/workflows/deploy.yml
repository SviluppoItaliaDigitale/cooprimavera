name: Pubblica su Aruba (LIVE)

# GO-LIVE del 2026-07-13: il sito viene compilato e pubblicato alla RADICE
# di www.cooprimavera.com a ogni push su main (niente più /anteprima/,
# niente noindex). Backup del vecchio sito: artifact "backup-vecchio-sito-
# cooprimavera" (90 giorni) + backup automatici Aruba + export locale.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-aruba
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.154.5"
          extended: true

      - name: Compila il sito
        run: hugo --minify

      - name: Pubblica via FTPS su Aruba
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # il certificato del server Aruba è intestato al nome macchina:
          # la verifica stretta del nome host fallirebbe
          security: loose
          local-dir: public/
          server-dir: www.cooprimavera.com/
